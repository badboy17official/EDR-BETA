<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intelligence Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Dashboard = () => {
            const [stats, setStats] = useState({ total_scans: 0, malicious: 0, suspicious: 0, benign: 0 });
            const [reports, setReports] = useState([]);
            const [filter, setFilter] = useState("");
            const [search, setSearch] = useState("");
            const [loading, setLoading] = useState(true);

            const fetchDashboardData = async () => {
                try {
                    setLoading(true);
                    
                    const statsRes = await fetch('/api/dashboard/stats');
                    const statsData = await statsRes.json();
                    if(statsData.status === "success") setStats(statsData.data);

                    let url = '/api/dashboard/reports?';
                    if(filter) url += `classification=${filter}&`;
                    if(search) url += `search=${search}&`;

                    const repRes = await fetch(url);
                    const repData = await repRes.json();
                    if(repData.status === "success") setReports(repData.data);
                    
                } catch (err) {
                    console.error("Failed to fetch dashboard data", err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchDashboardData();
                const interval = setInterval(fetchDashboardData, 10000); // Polling every 10s
                return () => clearInterval(interval);
            }, [filter, search]);

            const getBadgeColor = (classification) => {
                switch(classification) {
                    case 'malicious': return 'bg-red-500/20 text-red-400 border border-red-500/50';
                    case 'suspicious': return 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/50';
                    case 'benign': return 'bg-green-500/20 text-green-400 border border-green-500/50';
                    default: return 'bg-gray-500/20 text-gray-400 border border-gray-500/50';
                }
            };

            return (
                <div className="min-h-screen p-8">
                    <header className="mb-8 flex justify-between items-center border-b border-gray-800 pb-6">
                        <div>
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">Nexus EDR Threat Center</h1>
                            <p className="text-gray-400 text-sm mt-1">Real-time Hybrid Detection Pipeline</p>
                        </div>
                        <div className="flex items-center space-x-4">
                            {loading && <span className="text-sm text-gray-500 animate-pulse">Syncing...</span>}
                            <button onClick={fetchDashboardData} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-medium transition-colors">
                                Refresh Data
                            </button>
                        </div>
                    </header>

                    {/* Stats Row */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div className="bg-gray-900 border border-gray-800 p-6 rounded-xl">
                            <h3 className="text-gray-400 text-sm font-medium uppercase tracking-wider">Total Scans</h3>
                            <p className="text-3xl font-bold mt-2">{stats.total_scans}</p>
                        </div>
                        <div className="bg-gray-900 border border-red-900/50 p-6 rounded-xl shadow-[0_0_15px_rgba(220,38,38,0.1)]">
                            <h3 className="text-red-400 text-sm font-medium uppercase tracking-wider">Malicious</h3>
                            <p className="text-3xl font-bold mt-2 text-red-500">{stats.malicious}</p>
                        </div>
                        <div className="bg-gray-900 border border-yellow-900/50 p-6 rounded-xl shadow-[0_0_15px_rgba(202,138,4,0.1)]">
                            <h3 className="text-yellow-400 text-sm font-medium uppercase tracking-wider">Suspicious</h3>
                            <p className="text-3xl font-bold mt-2 text-yellow-500">{stats.suspicious}</p>
                        </div>
                        <div className="bg-gray-900 border border-green-900/50 p-6 rounded-xl">
                            <h3 className="text-green-400 text-sm font-medium uppercase tracking-wider">Benign</h3>
                            <p className="text-3xl font-bold mt-2 text-green-500">{stats.benign}</p>
                        </div>
                    </div>

                    {/* Filters & Search */}
                    <div className="flex flex-col md:flex-row gap-4 mb-6">
                        <input 
                            type="text" 
                            placeholder="Search by SHA256 Hash..." 
                            className="bg-gray-900 border border-gray-700 text-white rounded-lg px-4 py-2 w-full md:w-96 focus:outline-none focus:border-indigo-500"
                            value={search}
                            onChange={(e) => setSearch(e.target.value)}
                        />
                        <select 
                            className="bg-gray-900 border border-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500"
                            value={filter}
                            onChange={(e) => setFilter(e.target.value)}
                        >
                            <option value="">All Classifications</option>
                            <option value="malicious">Malicious</option>
                            <option value="suspicious">Suspicious</option>
                            <option value="benign">Benign</option>
                        </select>
                    </div>

                    {/* Timeline / Live Feed Table */}
                    <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-gray-800/50 text-gray-400 text-xs uppercase">
                                    <tr>
                                        <th className="px-6 py-4 font-medium">Last Seen</th>
                                        <th className="px-6 py-4 font-medium">SHA256 Hash</th>
                                        <th className="px-6 py-4 font-medium">Classification</th>
                                        <th className="px-6 py-4 font-medium">Risk Score</th>
                                        <th className="px-6 py-4 font-medium">Sandbox Details</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-800">
                                    {reports.map((report, idx) => (
                                        <tr key={idx} className="hover:bg-gray-800/20 transition-colors">
                                            <td className="px-6 py-4 text-sm text-gray-300">
                                                {new Date(report.last_seen || Date.now()).toLocaleString()}
                                            </td>
                                            <td className="px-6 py-4 text-sm font-mono truncate max-w-[200px]" title={report.sha256}>
                                                {report.sha256.substring(0, 16)}...
                                            </td>
                                            <td className="px-6 py-4">
                                                <span className={`px-3 py-1 rounded-full text-xs font-semibold ${getBadgeColor(report.classification)}`}>
                                                    {report.classification.toUpperCase()}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4">
                                                <div className="flex items-center space-x-2">
                                                    <div className="w-full bg-gray-700 rounded-full h-2 max-w-[100px]">
                                                        <div 
                                                            className={`h-2 rounded-full ${report.risk_score > 75 ? 'bg-red-500' : report.risk_score > 40 ? 'bg-yellow-500' : 'bg-green-500'}`} 
                                                            style={{ width: `${report.risk_score}%` }}>
                                                        </div>
                                                    </div>
                                                    <span className="text-xs text-gray-400">{report.risk_score.toFixed(1)}</span>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4">
                                                {report.sandbox_results ? (
                                                    <div className="text-xs space-y-1">
                                                        {report.sandbox_results.network_activity && (
                                                            <span className="inline-block bg-orange-500/20 text-orange-400 border border-orange-500/30 px-2 py-0.5 rounded mr-1">
                                                                Net Acitivity
                                                            </span>
                                                        )}
                                                        {report.sandbox_results.suspicious_actions?.slice(0,2).map((a, i) => (
                                                            <div key={i} className="text-gray-400 block truncate max-w-[250px]" title={a}>• {a}</div>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <span className="text-xs text-gray-600 italic">No dynamic trace</span>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                    {reports.length === 0 && (
                                        <tr>
                                            <td colSpan="5" className="px-6 py-12 text-center text-gray-500">
                                                No scan records found matching the criteria.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
